services:
  mongodb:
    image: mongo:7.0
    container_name: ui_playwright_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: ui_playwright_tests
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/ui_playwright_tests -u root -p root --authenticationDatabase admin --quiet
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

volumes:
  mongodb_data:
  mongodb_config:
